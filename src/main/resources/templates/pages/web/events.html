<!doctype html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/web/main-layout}"
>
<head>
    <title>Danh sách sự kiện</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <nav class="flex items-center gap-2 text-sm text-slate-500 mb-8 overflow-x-auto whitespace-nowrap pb-2">
            <a th:href="@{/}" class="hover:text-primary flex items-center gap-1">
                <span class="material-symbols-outlined text-base">home</span> Trang chủ
            </a>
            <span class="material-symbols-outlined text-xs">chevron_right</span>
            <span class="hover:text-primary text-primary font-medium">Sự kiện</span>
        </nav>

        <div class="mb-10">
            <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white mb-4">
                Khám phá các sự kiện
            </h1>
            <p class="text-lg text-slate-600 dark:text-slate-400 max-w-3xl">
                Tham gia các sự kiện gây quỹ của chúng tôi và cùng tạo nên những
                thay đổi tích cực cho cộng đồng. Mỗi sự kiện là một cơ hội để
                lan tỏa hy vọng và giúp đỡ nhiều người hơn.
            </p>
        </div>
        <div class="flex flex-col lg:flex-row gap-8">
            <!--  Filter Event  -->
            <aside class="w-full lg:w-64 flex-shrink-0">
                <div class="bg-white dark:bg-slate-900 rounded-xl p-6 shadow-sm border border-slate-200 dark:border-slate-800 sticky top-24">
                    <div class="mb-6">
                        <h3 class="font-bold text-slate-900 dark:text-white mb-4 flex items-center">
                            <span class="material-icons text-primary mr-2">filter_list</span>
                            Bộ lọc
                        </h3>

                        <div class="relative mb-6">
                            <input id="search-event"
                                   class="w-full pl-10 pr-4 py-2 border border-slate-300 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-primary focus:border-primary text-sm"
                                   placeholder="Search events..."
                                   type="text"/>
                            <span class="material-icons absolute left-3 top-2.5 text-slate-400 text-lg">search</span>
                        </div>
                        <!-- Status Filter -->
                        <div class="space-y-1">
                            <label class="font-semibold text-sm text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 block">Trạng
                                thái</label>
                            <div id="status-group" class="flex flex-col space-y-2">
                                <label class="inline-flex items-center cursor-pointer group">
                                    <input value="" class="form-radio text-primary" name="status" type="radio" checked/>
                                    <span class="ml-2 text-slate-700 dark:text-slate-300 group-hover:text-primary transition-colors">Tất cả</span>
                                </label>
                                <label class="inline-flex items-center cursor-pointer group"
                                       th:each="status : ${statuses}">
                                    <input th:value="${status}" class="form-radio text-primary" name="status"
                                           type="radio"/>
                                    <span class="ml-2 text-slate-700 dark:text-slate-300 group-hover:text-primary transition-colors"
                                          th:text="${status.value}"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-100 dark:border-slate-800">
                        <label class="font-semibold text-sm text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3 block">Danh
                            mục</label>
                        <div id="category-group" class="space-y-2">
                            <label th:each="category : ${categories}"
                                   class="flex items-center space-x-2 cursor-pointer">
                                <input class="category-checkbox form-checkbox rounded text-primary" type="checkbox"
                                       name="category"
                                       th:value="${category.id}"/>
                                <span class="text-sm text-slate-600 dark:text-slate-400"
                                      th:text="${category.name}"></span>
                            </label>


                        </div>

                        <button id="resetFiltersBtn"
                                class="mt-6 w-full py-2 text-xs font-bold text-slate-400 hover:text-primary transition-colors uppercase tracking-widest">
                            Xoá lọc
                        </button>
                    </div>
                </div>
            </aside>
            <!--  Event List  -->
            <div class="flex-1">
                <div id="event-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                </div>
                <div id="loading-events" class="text-center py-8 text-slate-500 hidden">
                    <span class="animate-pulse">Đang tải sự kiện...</span>
                </div>
                <div id="load-more-trigger" class="h-8"></div>
            </div>
        </div>
    </div>
</div>
<th:block layout:fragment="scripts">
    <script type="module">
        const eventContainer = document.getElementById("event-container");
        const loadingEvents = document.getElementById("loading-events");
        const loadMoreTrigger = document.getElementById("load-more-trigger");
        const searchInput = document.getElementById("search-event");
        const statusGroup = document.getElementById("status-group");
        const categoryGroup = document.getElementById("category-group");
        const resetFilterBtn = document.getElementById("resetFiltersBtn");

        const state = {
            page: 1,
            size: 9,
            search: "",
            status: "",
            categoryIds: [],
            isLoading: false,
            hasMore: true
        };

        let searchTimeout = null;
        let observer = null;

        document.addEventListener("DOMContentLoaded", () => {
            bindFilters();
            initInfiniteScroll();
            resetAndLoad();
        });

        function bindFilters() {
            searchInput.addEventListener("input", () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    state.search = searchInput.value.trim();
                    resetAndLoad();
                }, 400);
            });

            statusGroup.addEventListener("change", () => {
                const selectedStatus = statusGroup.querySelector('input[name="status"]:checked');
                state.status = selectedStatus ? selectedStatus.value : "";
                resetAndLoad();
            });

            categoryGroup.addEventListener("change", () => {
                state.categoryIds = Array.from(categoryGroup.querySelectorAll(".category-checkbox:checked"))
                    .map((cb) => cb.value);
                resetAndLoad();
            });

            resetFilterBtn?.addEventListener("click", (event) => {
                event.preventDefault();
                searchInput.value = "";
                const allStatusRadio = statusGroup.querySelector('input[name="status"][value=""]');
                if (allStatusRadio) allStatusRadio.checked = true;
                categoryGroup.querySelectorAll(".category-checkbox").forEach((cb) => cb.checked = false);

                state.search = "";
                state.status = "";
                state.categoryIds = [];
                resetAndLoad();
            });
        }

        function initInfiniteScroll() {
            observer = new IntersectionObserver(
                (entries) => {
                    if (entries[0].isIntersecting) {
                        loadEvents();
                    }
                },
                {rootMargin: "200px"}
            );
            observer.observe(loadMoreTrigger);
        }

        function resetAndLoad() {
            state.page = 1;
            state.hasMore = true;
            eventContainer.innerHTML = "";
            loadEvents();
        }

        async function loadEvents() {
            if (state.isLoading || !state.hasMore) return;
            state.isLoading = true;
            loadingEvents.classList.remove("hidden");

            try {
                const params = new URLSearchParams();
                params.set("page", String(state.page));
                params.set("size", String(state.size));
                if (state.search) params.set("search", state.search);
                if (state.status) params.set("status", state.status);
                state.categoryIds.forEach((id) => params.append("categoryIds", id));

                const response = await fetch(`/api/events?${params.toString()}`);
                const result = await response.json();

                const pageData = result?.data || {};
                const events = pageData.data || [];

                if (state.page === 1 && events.length === 0) {
                    eventContainer.innerHTML = '<div class="col-span-full text-center py-10 text-slate-500">Không tìm thấy sự kiện nào khớp với bộ lọc.</div>';
                    state.hasMore = false;
                    return;
                }

                appendEvents(events);

                const totalPages = pageData.totalPages || 0;
                state.page += 1;
                state.hasMore = state.page <= totalPages;
            } catch (error) {
                console.error("Lỗi khi tải sự kiện:", error);
                if (state.page === 1) {
                    eventContainer.innerHTML = '<div class="col-span-full text-center py-10 text-red-500">Không thể kết nối máy chủ.</div>';
                }
            } finally {
                state.isLoading = false;
                loadingEvents.classList.add("hidden");
            }
        }

        function appendEvents(events) {
            events.forEach(event => {
                const isCompleted = event.status === 'COMPLETED';
                const currentAmount = Number(event.currentAmount || 0);
                const targetAmount = Number(event.targetAmount || 0);
                const progress = targetAmount > 0 ? Math.min((currentAmount / targetAmount) * 100, 100).toFixed(2) : 0;

                const col = document.createElement('div');
                col.className = 'event-item';
                col.dataset.status = event.status;
                col.dataset.categoryId = event.category?.id || '';

                const dateRange = formatDateRange(event.startDate, event.endDate);

                col.innerHTML = `
                <article class="bg-white dark:bg-slate-900 rounded-xl overflow-hidden shadow-sm hover:shadow-lg transition-all duration-300 border border-slate-200 dark:border-slate-800 group flex flex-col h-full ${isCompleted ? 'opacity-90' : ''}">
                    <div class="relative h-48 overflow-hidden">
                        <img src="${event.thumbnailUrl || '/images/default-event.jpg'}"
                             alt="${event.name}"
                             class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-500 ${isCompleted ? 'grayscale-[50%] group-hover:grayscale-0' : ''}">

                        <div class="absolute top-4 left-4 ${isCompleted ? 'bg-slate-600/90' : 'bg-emerald-500/90'} backdrop-blur px-3 py-1 rounded-full text-xs font-bold text-white shadow-sm flex items-center gap-1">
                            ${isCompleted ?
                    `<span class="material-icons text-[10px]">check_circle</span> ${event.status || 'Hoàn thành'}` :
                    `<span class="w-2 h-2 rounded-full bg-white animate-pulse"></span> ${event.status || 'Đang diễn ra'}`}
                        </div>
                    </div>

                    <div class="p-5 flex-1 flex flex-col">
                        <div class="flex justify-between items-start mb-2">
                            <div class="text-xs font-semibold text-primary bg-primary-light/50 px-2 py-1 rounded">
                                ${event.category?.name || 'Sự kiện'}
                            </div>
                            <div class="flex items-center text-xs text-slate-500 dark:text-slate-400">
                                <span class="material-icons text-sm mr-1">event</span>
                                ${dateRange}
                            </div>
                        </div>

                        <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-2 line-clamp-2 hover:text-primary transition-colors">
                            <a href="/events/${event.slug}">${event.name}</a>
                        </h3>

                        <p class="text-slate-600 dark:text-slate-400 text-sm mb-4 line-clamp-2 flex-grow">
                            ${event.shortDescription || ''}
                        </p>

                        <div class="mt-auto">
                            <div class="flex justify-between text-sm mb-1.5 font-medium">
                                <span class="text-slate-900 dark:text-white">${formatCurrency(currentAmount)}</span>
                                <span class="text-slate-500">/ ${formatCurrency(targetAmount)}</span>
                            </div>

                            <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-full h-2 mb-2">
                                <div class="bg-primary h-2 rounded-full" style="width: ${progress}%"></div>
                            </div>

                            <div class="flex justify-between items-center mt-4">
                                <span class="text-xs font-bold text-primary">Đạt ${Math.round(progress)}%</span>
                                <a href="/events/${event.slug}" class="text-sm font-semibold text-slate-700 dark:text-slate-300 hover:text-primary flex items-center transition-colors">
                                    Xem chi tiết
                                    <span class="material-icons text-sm ml-1">arrow_forward</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </article>
            `;
                eventContainer.appendChild(col);
            });
        }

        function formatDateRange(startDate, endDate) {
            if (!startDate) return '---';
            const start = new Date(startDate);
            const startText = start.toLocaleDateString('vi-VN');
            if (!endDate) return startText;
            const end = new Date(endDate);
            return `${startText} - ${end.toLocaleDateString('vi-VN')}`;
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('vi-VN', {style: 'currency', currency: 'VND'})
                .format(value || 0);
        }
    </script>
</th:block>
</body>
</html>
