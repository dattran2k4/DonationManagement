<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập quản trị</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #389663;
            --primary-dark: #2f7e54;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --line: #e2e8f0;
            --surface: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #eef8f1 0%, #f4faf6 35%, #f7fbf8 100%);
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 460px;
            border-radius: 26px;
            overflow: hidden;
            background: var(--surface);
            box-shadow: 0 24px 50px rgba(2, 6, 23, 0.12);
            border: 1px solid #f1f5f9;
        }

        .hero {
            height: 160px;
            background:
                    linear-gradient(180deg, rgba(255,255,255,0.38) 0%, rgba(255,255,255,0.78) 100%),
                    url('https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?q=80&w=1200&auto=format&fit=crop');
            background-position: center;
            background-size: cover;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 16px;
        }

        .hero-badge {
            width: 68px;
            height: 68px;
            border-radius: 22px;
            background: #ffffff;
            border: 4px solid rgba(255, 255, 255, 0.82);
            padding: 6px;
            display: grid;
            place-items: center;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(56, 150, 99, 0.28);
        }

        .hero-badge img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        .content {
            padding: 24px 28px 30px;
        }

        h1 {
            margin: 0;
            font-size: 44px;
            line-height: 1.1;
            text-align: center;
            color: var(--text-dark);
            font-weight: 800;
        }

        .subtitle {
            margin-top: 10px;
            text-align: center;
            color: var(--text-muted);
            font-size: 22px;
            font-weight: 500;
        }

        .form {
            margin-top: 30px;
        }

        .row-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .label {
            color: #334155;
            font-size: 28px;
            font-weight: 700;
        }

        .link {
            color: var(--primary);
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
        }

        .input-wrap {
            border: 2px solid var(--line);
            border-radius: 14px;
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            margin-bottom: 18px;
            transition: border-color .2s ease, box-shadow .2s ease;
            background: #fff;
        }

        .input-wrap:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(56, 150, 99, 0.18);
        }

        .input-wrap .icon {
            color: #94a3b8;
            font-size: 22px;
            flex: 0 0 auto;
        }

        .input-wrap input {
            border: 0;
            outline: 0;
            width: 100%;
            font-size: 24px;
            color: #0f172a;
            background: transparent;
        }

        .toggle-password {
            border: 0;
            background: transparent;
            color: var(--primary);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            padding: 0;
            flex: 0 0 auto;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #64748b;
            font-size: 16px;
            margin: 4px 0 18px;
        }

        .remember input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .btn {
            width: 100%;
            border: 0;
            border-radius: 12px;
            background: var(--primary);
            color: #ffffff;
            height: 64px;
            font-size: 32px;
            font-weight: 800;
            cursor: pointer;
            transition: transform .08s ease, background-color .2s ease, box-shadow .2s ease;
            box-shadow: 0 12px 22px rgba(56, 150, 99, 0.30);
        }

        .btn:hover {
            background: var(--primary-dark);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .alert {
            margin-bottom: 14px;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 16px;
            font-weight: 600;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        @media (max-width: 640px) {
            .content { padding: 20px; }
            h1 { font-size: 28px; }
            .subtitle { font-size: 18px; }
            .label { font-size: 22px; }
            .input-wrap input { font-size: 18px; }
            .hero-badge { width: 60px; height: 60px; }
            .btn { font-size: 24px; height: 56px; }
        }
    </style>
</head>
<body>
<main class="login-card">
    <div class="hero">
        <div class="hero-badge">
            <img th:src="@{/images/logo.jpg}" alt="Logo câu lạc bộ">
        </div>
    </div>
    <section class="content">
        <h1>Chào mừng trở lại</h1>
        <p class="subtitle">Cổng đăng nhập quản trị</p>

        <div class="alert alert-error" th:if="${param.error}">
            Sai tên đăng nhập hoặc mật khẩu.
        </div>
        <div class="alert alert-success" th:if="${param.logout}">
            Bạn đã đăng xuất thành công.
        </div>

        <form class="form" method="post" th:action="@{/login}">
            <div class="row-head">
                <label class="label" for="username">Tên đăng nhập</label>
            </div>
            <div class="input-wrap">
                <span class="icon">@</span>
                <input id="username" name="username" type="text" placeholder="admin" required autofocus>
            </div>

            <div class="row-head">
                <label class="label" for="password">Mật khẩu</label>
                <a class="link" href="mailto:contact@chiaseyeuthuong.org?subject=Ho%20tro%20khoi%20phuc%20mat%20khau">Quên mật khẩu?</a>
            </div>
            <div class="input-wrap">
                <span class="icon">🔒</span>
                <input id="password" name="password" type="password" placeholder="********" required>
                <button class="toggle-password" type="button" data-toggle-password aria-controls="password">Hiện</button>
            </div>

            <label class="remember">
                <input type="checkbox" name="remember-me">
                <span>Ghi nhớ đăng nhập</span>
            </label>

            <button class="btn" type="submit">Đăng nhập</button>
        </form>
    </section>
</main>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const toggleButton = document.querySelector('[data-toggle-password]');
        const passwordInput = document.getElementById('password');

        if (!toggleButton || !passwordInput) {
            return;
        }

        toggleButton.addEventListener('click', function () {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleButton.textContent = isPassword ? 'Ẩn' : 'Hiện';
        });
    });
</script>
</body>
</html>
