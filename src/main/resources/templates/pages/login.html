<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập quản trị</title>
    <style>
        :root {
            --primary: #2edb83;
            --primary-dark: #22c46f;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --line: #e2e8f0;
            --surface: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #f0fdf4 0%, #f8fafc 35%, #f8fafc 100%);
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 460px;
            border-radius: 26px;
            overflow: hidden;
            background: var(--surface);
            box-shadow: 0 24px 50px rgba(2, 6, 23, 0.12);
            border: 1px solid #f1f5f9;
        }

        .hero {
            height: 160px;
            background:
                    linear-gradient(180deg, rgba(255,255,255,0.38) 0%, rgba(255,255,255,0.78) 100%),
                    url('https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?q=80&w=1200&auto=format&fit=crop');
            background-position: center;
            background-size: cover;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 16px;
        }

        .hero-badge {
            width: 44px;
            height: 44px;
            border-radius: 999px;
            background: var(--primary);
            display: grid;
            place-items: center;
            color: white;
            font-size: 22px;
            font-weight: 700;
            box-shadow: 0 8px 22px rgba(46, 219, 131, 0.45);
        }

        .content {
            padding: 24px 28px 30px;
        }

        h1 {
            margin: 0;
            font-size: 44px;
            line-height: 1.1;
            text-align: center;
            color: var(--text-dark);
            font-weight: 800;
        }

        .subtitle {
            margin-top: 10px;
            text-align: center;
            color: var(--text-muted);
            font-size: 22px;
            font-weight: 500;
        }

        .form {
            margin-top: 30px;
        }

        .row-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .label {
            color: #334155;
            font-size: 28px;
            font-weight: 700;
        }

        .link {
            color: var(--primary);
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
        }

        .input-wrap {
            border: 2px solid var(--line);
            border-radius: 14px;
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            margin-bottom: 18px;
            transition: border-color .2s ease, box-shadow .2s ease;
            background: #fff;
        }

        .input-wrap:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(46, 219, 131, 0.18);
        }

        .input-wrap .icon {
            color: #94a3b8;
            font-size: 22px;
            flex: 0 0 auto;
        }

        .input-wrap input {
            border: 0;
            outline: 0;
            width: 100%;
            font-size: 24px;
            color: #0f172a;
            background: transparent;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #64748b;
            font-size: 16px;
            margin: 4px 0 18px;
        }

        .remember input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .btn {
            width: 100%;
            border: 0;
            border-radius: 12px;
            background: var(--primary);
            color: #042312;
            height: 64px;
            font-size: 32px;
            font-weight: 800;
            cursor: pointer;
            transition: transform .08s ease, background-color .2s ease, box-shadow .2s ease;
            box-shadow: 0 12px 22px rgba(46, 219, 131, 0.30);
        }

        .btn:hover {
            background: var(--primary-dark);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .alert {
            margin-bottom: 14px;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 16px;
            font-weight: 600;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        @media (max-width: 640px) {
            .content { padding: 20px; }
            h1 { font-size: 28px; }
            .subtitle { font-size: 18px; }
            .label { font-size: 22px; }
            .input-wrap input { font-size: 18px; }
            .btn { font-size: 24px; height: 56px; }
        }
    </style>
</head>
<body>
<main class="login-card">
    <div class="hero">
            <div class="hero-badge">L</div>
    </div>
    <section class="content">
        <h1>Welcome back</h1>
        <p class="subtitle">Administrative Access Portal</p>

        <div class="alert alert-error" th:if="${param.error}">
            Sai tên đăng nhập hoặc mật khẩu.
        </div>
        <div class="alert alert-success" th:if="${param.logout}">
            Bạn đã đăng xuất thành công.
        </div>

        <form class="form" method="post" th:action="@{/login}">
            <div class="row-head">
                <label class="label" for="username">Admin Email</label>
            </div>
            <div class="input-wrap">
                <span class="icon">@</span>
                <input id="username" name="username" type="text" placeholder="admin@charityhope.org" required autofocus>
            </div>

            <div class="row-head">
                <label class="label" for="password">Password</label>
                <a class="link" href="#">Forgot password?</a>
            </div>
            <div class="input-wrap">
                <span class="icon">🔒</span>
                <input id="password" name="password" type="password" placeholder="********" required>
                <span class="icon" aria-hidden="true">O</span>
            </div>

            <label class="remember">
                <input type="checkbox" name="remember-me">
                <span>Keep me logged in</span>
            </label>

            <button class="btn" type="submit">> Secure Login</button>
        </form>
    </section>
</main>
</body>
</html>
