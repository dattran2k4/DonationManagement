<!doctype html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/admin/admin-layout}"
>
<head>
    <title>Admin Dashboard</title>
</head>
<body>
<div layout:fragment="content" class="space-y-6">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-text-main dark:text-white tracking-tight">Quản lý Hoạt
                    động</h1>
                <p class="text-text-secondary text-sm mt-1">Quản lý các hoạt động và theo dõi tiến độ gây quỹ</p>
            </div>
            <a th:href="@{/admin/activities/form}"
               sec:authorize="hasRole('ADMIN')"
               class="flex items-center justify-center gap-2 bg-primary hover:bg-emerald-400 text-white dark:text-background-dark font-semibold px-5 py-2.5 rounded-lg shadow-md shadow-primary/20 transition-all hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0">
                <span class="material-symbols-outlined text-[20px]">add</span>
                <span>Thêm Hoạt động mới</span>
            </a>
        </div>
        <div class="bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm border border-border-color p-4 md:p-5">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                <div class="md:col-span-5 lg:col-span-4">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 text-[20px]">search</span>
                        </div>
                        <input id="activitySearchInput"
                               class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 rounded-lg leading-5 bg-white dark:bg-slate-800 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-shadow"
                               placeholder="Tìm theo tên hoạt động, địa điểm..." type="text"/>
                    </div>
                </div>
                <div class="md:col-span-3 lg:col-span-3">
                    <div class="relative">
                        <select id="activityStatusFilter"
                                class="block w-full pl-3 pr-10 py-2.5 border border-slate-200 rounded-lg leading-5 bg-white dark:bg-slate-800 dark:border-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm appearance-none cursor-pointer">
                            <option value="">Tất cả trạng thái</option>
                            <option value="DRAFT">Bản nháp</option>
                            <option value="UPCOMING">Sắp diễn ra</option>
                            <option value="ONGOING">Đang diễn ra</option>
                            <option value="COMPLETED">Hoàn thành</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 text-[20px]">expand_more</span>
                        </div>
                    </div>
                </div>
                <div class="md:col-span-12 lg:col-span-2 flex items-end">
                    <button id="activityResetFilterBtn"
                            class="w-full flex items-center justify-center gap-2 py-2.5 px-4 border border-slate-200 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 text-sm font-medium transition-colors">
                        <span class="material-symbols-outlined text-[18px]">filter_alt_off</span>
                        <span>Đặt lại</span>
                    </button>
                </div>
            </div>
        </div>
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                    <tr>
                        <!--                        <th class="px-6 py-4 text-left text-xs font-semibold text-text-secondary uppercase tracking-wider w-[240px]"-->
                        <!--                            scope="col">ID-->
                        <!--                        </th>-->
                        <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider w-[240px]"
                            scope="col">Tên hoạt động
                        </th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider"
                            scope="col">Thuộc sự kiện
                        </th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider"
                            scope="col">Thời gian
                        </th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider"
                            scope="col">Địa điểm
                        </th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider min-w-[200px]"
                            scope="col">Số tiền hiện tại / Mục tiêu
                        </th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider"
                            scope="col">Trạng thái
                        </th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-slate-600 uppercase tracking-wider min-w-[120px]"
                            scope="col">Thao tác
                        </th>
                    </tr>
                    </thead>
                    <tbody id="activityTableBody"
                           class="bg-white divide-y divide-slate-200"></tbody>
                </table>
            </div>
            <!-- Pagination -->
            <div id="paginationContainer"></div>
    </div>
</div>
<th:block layout:fragment="scripts">
    <script type="module" th:src="@{/js/pages/admin/activityList.js}"></script>
</th:block>
</body>
</html>
