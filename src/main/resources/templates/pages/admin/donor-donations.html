<!doctype html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/admin/admin-layout}"
>
<head>
    <title>Lịch sử quyên góp nhà hảo tâm</title>
</head>
<body>
<div layout:fragment="content" class="space-y-6">
    <div class="flex items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Lịch sử quyên góp</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
                <span class="font-semibold text-slate-700 dark:text-slate-300" th:text="${donor.fullName}">Nhà hảo tâm</span>
                <span class="mx-1">-</span>
                <span th:text="${donor.phone}">SĐT</span>
            </p>
        </div>
        <a th:href="@{/admin/donors}"
           class="inline-flex items-center gap-2 rounded-lg border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            Quay lại danh sách
        </a>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50">
                <tr>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Mã đơn</th>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Mục tiêu</th>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Tiêu đề</th>
                    <th class="px-6 py-4 text-right text-xs font-semibold text-slate-600 uppercase tracking-wider">Số tiền</th>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Trạng thái</th>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Thời gian</th>
                </tr>
                </thead>
                <tbody id="donorDonationTableBody" class="bg-white divide-y divide-slate-200">
                <tr>
                    <td class="px-6 py-8 text-center text-slate-500" colspan="6">Đang tải dữ liệu...</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div id="paginationContainer"></div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:inline="javascript">
        window.__DONOR_ID__ = [[${donorId}]];
    </script>
    <script type="module" th:src="@{/js/pages/admin/donorDonationHistory.js}"></script>
</th:block>
</body>
</html>
