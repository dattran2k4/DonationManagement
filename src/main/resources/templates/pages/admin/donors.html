<!doctype html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/admin/admin-layout}"
>
<head>
    <title>Admin Dashboard</title>
</head>
<body>
<div layout:fragment="content">
    <div class="space-y-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 dark:text-white tracking-tight">Quản lý Nhà hảo tâm</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Theo dõi thông tin và lịch sử đóng góp của nhà hảo tâm.</p>
            </div>
            <!-- Action Bar & Filters -->
            <div class="bg-surface-light dark:bg-surface-dark p-5 rounded-xl border border-border-light dark:border-border-dark shadow-sm flex flex-col lg:flex-row gap-4 justify-between items-start lg:items-center">
                <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto flex-1">
                    <!-- Search -->
                    <div class="relative w-full sm:w-80 group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors">search</span>
                        </div>
                        <input id="donorSearchInput"
                               class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg leading-5 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-shadow"
                               placeholder="Họ tên, số điện thoại, email..." type="text" value=""/>
                    </div>
                    <!-- Filters -->
                    <div class="flex gap-3">
                        <div class="relative group">
                            <select id="donorTypeFilter"
                                    class="appearance-none bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 py-2.5 pl-4 pr-10 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors min-w-[140px]">
                                <option value="">Loại: Tất cả</option>
                                <option value="INDIVIDUAL">Cá nhân</option>
                                <option value="ORGANIZATION">Tổ chức</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-500">
                                <span class="material-symbols-outlined text-sm">expand_more</span>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Add Button -->
                <a th:href="@{/admin/donors/form}"
                   class="bg-primary hover:bg-primary/90 text-white font-semibold py-2.5 px-5 rounded-lg shadow-sm shadow-primary/20 dark:shadow-none flex items-center gap-2 transition-all active:scale-95 shrink-0 w-full sm:w-auto justify-center">
                    <span class="material-symbols-outlined text-[20px]">add</span>
                    <span>Thêm Nhà hảo tâm</span>
                </a>
            </div>
            <!-- Data Table -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="min-w-full divide-y divide-slate-200">
                        <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider"
                                scope="col">
                                Tên nhà hảo tâm
                            </th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider"
                                scope="col">
                                Loại
                            </th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider"
                                scope="col">
                                Thông tin liên hệ
                            </th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider"
                                scope="col">
                                Ngày tham gia
                            </th>
                            <th class="px-6 py-4 text-center text-xs font-semibold text-slate-600 uppercase tracking-wider"
                                scope="col">
                                Số lần đóng góp
                            </th>
                            <th class="px-6 py-4 text-right text-xs font-semibold text-slate-600 uppercase tracking-wider"
                                scope="col">
                                Tổng tiền
                            </th>
                            <th class="px-6 py-4 text-center text-xs font-semibold text-slate-600 uppercase tracking-wider sticky right-0 bg-slate-50 shadow-[-10px_0_15px_-10px_rgba(0,0,0,0.1)]"
                                scope="col">
                                Hành động
                            </th>
                        </tr>
                        </thead>
                        <tbody id="donorTableBody"
                               class="bg-white divide-y divide-slate-200">
                        </tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div id="paginationContainer"></div>
        </div>
    </div>
</div>
<th:block layout:fragment="scripts">
    <script type="module" th:src="@{/js/pages/admin/donorList.js}"></script>
</th:block>
</body>
</html>
