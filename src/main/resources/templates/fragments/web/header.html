<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/web/main-layout}">
<body>
<header th:fragment="header"
        class="sticky top-0 z-50 w-full bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-20">
            <!-- Logo -->
            <a th:href="@{/}" class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                <img th:src="@{/images/logo.jpg}"
                     alt="Logo CLB"
                     class="w-10 h-10 object-contain">

                <span class="font-bold text-2xl tracking-tight text-slate-900 dark:text-white">
                    CLB
                    <span class="text-primary">Chia sẻ yêu thương</span>
                </span>
            </a>
            <!-- Navigation -->
            <nav class="hidden md:flex space-x-8">
                <a class="text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-primary font-medium transition-colors"
                   th:href="@{/events}">Sự kiện</a>
                <a class="text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-primary font-medium transition-colors"
                   th:href="@{/donations}">Quyên góp</a>
                <a class="text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-primary font-medium transition-colors"
                   th:href="@{/about}">Về chúng tôi</a>
                <a class="text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-primary font-medium transition-colors"
                   href="#">Liên hệ</a>
            </nav>
            <!-- CTA -->
            <div class="flex items-center space-x-4">
                <a th:href="@{/donations}"
                   class="hidden md:inline-flex items-center justify-center px-6 py-2.5 border border-transparent text-sm font-semibold rounded-lg shadow-sm text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all">
                    Quyên góp ngay
                </a>
                <!-- Mobile menu button -->
                <button class="md:hidden p-2 rounded-md text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">
                    <span class="material-icons">menu</span>
                </button>
            </div>
        </div>
    </div>
</header>
</body>
</html>
