<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE"></title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.ckeditor.com/ckeditor5/47.6.0/ckeditor5.css"/>
    <script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>
    <style>
        .admin-theme {
            --admin-text-primary-light: #0f172a;
            --admin-text-secondary-light: #64748b;
            --admin-text-primary-dark: #f8fafc;
            --admin-text-secondary-dark: #94a3b8;
            --admin-border-dark: #334155;
            --admin-surface-light: #ffffff;
            --admin-surface-dark: #0f172a;
            --admin-surface-dark-soft: #1e293b;
            --admin-surface-dark-soft-strong: rgba(15, 23, 42, 0.88);
        }

        .admin-theme .bg-surface {
            background-color: var(--admin-surface-light);
        }

        .admin-theme .text-text-main,
        .admin-theme .text-text-primary-light {
            color: var(--admin-text-primary-light);
        }

        .admin-theme .text-text-secondary,
        .admin-theme .text-text-secondary-light {
            color: var(--admin-text-secondary-light);
        }

        .admin-theme .text-text-primary-dark {
            color: var(--admin-text-primary-dark);
        }

        .admin-theme .text-text-secondary-dark {
            color: var(--admin-text-secondary-dark);
        }

        .admin-theme .border-border-dark {
            border-color: var(--admin-border-dark);
        }

        .admin-theme .bg-primary {
            color: #ffffff;
        }

        .admin-theme .bg-primary .material-symbols-outlined,
        .admin-theme .bg-primary .material-icons {
            color: currentColor;
        }

        @media (prefers-color-scheme: dark) {
            .admin-theme .admin-sidebar,
            .admin-theme .bg-surface,
            .admin-theme .dark\:bg-surface-dark,
            .admin-theme .bg-white:not([class*="dark:bg-"]) {
                background-color: var(--admin-surface-dark);
            }

            .admin-theme .bg-slate-50:not([class*="dark:bg-"]),
            .admin-theme .bg-slate-100:not([class*="dark:bg-"]),
            .admin-theme .dark\:bg-slate-800 {
                background-color: var(--admin-surface-dark-soft);
            }

            .admin-theme .bg-slate-50\/50:not([class*="dark:bg-"]),
            .admin-theme .bg-slate-50\/95:not([class*="dark:bg-"]),
            .admin-theme .dark\:bg-slate-800\/30,
            .admin-theme .dark\:bg-slate-800\/50,
            .admin-theme .dark\:bg-slate-900\/50,
            .admin-theme .dark\:bg-slate-900\/90 {
                background-color: var(--admin-surface-dark-soft-strong);
            }

            .admin-theme .dark\:bg-slate-900 {
                background-color: var(--admin-surface-dark);
            }

            .admin-theme .text-slate-900,
            .admin-theme .text-slate-800,
            .admin-theme .text-text-main,
            .admin-theme .text-text-primary-light,
            .admin-theme .text-text-primary-dark {
                color: var(--admin-text-primary-dark);
            }

            .admin-theme .text-slate-700,
            .admin-theme .text-slate-600,
            .admin-theme .text-slate-500,
            .admin-theme .text-slate-400,
            .admin-theme .text-text-secondary,
            .admin-theme .text-text-secondary-light,
            .admin-theme .text-text-secondary-dark {
                color: var(--admin-text-secondary-dark);
            }

            .admin-theme .border-slate-100,
            .admin-theme .border-slate-200,
            .admin-theme .border-border-light,
            .admin-theme .border-border-dark,
            .admin-theme .dark\:border-slate-600,
            .admin-theme .dark\:border-slate-700,
            .admin-theme .dark\:border-slate-800,
            .admin-theme .admin-sidebar {
                border-color: var(--admin-border-dark);
            }

            .admin-theme .divide-slate-200 > :not([hidden]) ~ :not([hidden]) {
                border-color: var(--admin-border-dark);
            }

            .admin-theme .hover\:bg-slate-50:hover,
            .admin-theme .hover\:bg-slate-50\/50:hover,
            .admin-theme .hover\:bg-slate-100:hover {
                background-color: rgba(51, 65, 85, 0.45);
            }

            .admin-theme .hover\:text-slate-600:hover,
            .admin-theme .hover\:text-slate-700:hover {
                color: var(--admin-text-primary-dark);
            }
        }
    </style>

    <!-- Favicon   -->
    <link rel="apple-touch-icon" sizes="57x57" th:href="@{/favicon/apple-icon-57x57.png}">
    <link rel="apple-touch-icon" sizes="60x60" th:href="@{/favicon/apple-icon-60x60.png}">
    <link rel="apple-touch-icon" sizes="72x72" th:href="@{/favicon/apple-icon-72x72.png}">
    <link rel="apple-touch-icon" sizes="76x76" th:href="@{/favicon/apple-icon-76x76.png}">
    <link rel="apple-touch-icon" sizes="114x114" th:href="@{/favicon/apple-icon-114x114.png}">
    <link rel="apple-touch-icon" sizes="120x120" th:href="@{/favicon/apple-icon-120x120.png}">
    <link rel="apple-touch-icon" sizes="144x144" th:href="@{/favicon/apple-icon-144x144.png}">
    <link rel="apple-touch-icon" sizes="152x152" th:href="@{/favicon/apple-icon-152x152.png}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/apple-icon-180x180.png}">

    <link rel="icon" type="image/png" sizes="192x192" th:href="@{/favicon/android-icon-192x192.png}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/favicon/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="96x96" th:href="@{/favicon/favicon-96x96.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/favicon/favicon-16x16.png}">

    <link rel="manifest" th:href="@{/favicon/manifest.json}">
    <meta name="msapplication-TileColor" content="#389663">
    <meta name="msapplication-TileImage" th:content="@{/favicon/ms-icon-144x144.png}">
    <meta name="theme-color" content="#389663">
</head>
<body class="admin-theme bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden">

<div class="flex h-screen w-full overflow-hidden">
    <aside th:replace="~{fragments/admin/sidebar :: sidebar}"></aside>
    <main class="flex-1 h-full overflow-y-auto relative bg-background-light dark:bg-background-dark">
        <div class="min-h-full p-4 md:p-6">
            <div class="mx-auto w-full max-w-[1600px]" layout:fragment="content"></div>
        </div>
    </main>
</div>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
